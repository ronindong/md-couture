<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{TITLE}}</title>
<style>
  :root {
    --bg: #ffffff;
    --bg-warm: #fbfaf7;
    --fg: #37352f;
    --fg-soft: #6b6960;
    --fg-muted: #9b9a93;
    --border: #ece9e2;
    --divider: #efedea;
    --accent: #9b6b43;
    --accent-soft: #efe4d6;
    --tag-blue: #e7f0f7;
    --tag-blue-fg: #2b5d85;
    --tag-red: #fbe8e7;
    --tag-red-fg: #a14f4a;
    --tag-green: #e8f2e4;
    --tag-green-fg: #4e7a3f;
    --radius: 4px;
    --shadow-soft: 0 1px 2px rgba(15,15,15,.05);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { font-size: 16px; scroll-behavior: smooth; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", Georgia, serif;
    background: var(--bg-warm); color: var(--fg);
    line-height: 1.72;
    letter-spacing: .005em;
  }
  .page {
    max-width: 900px;
    margin: 0 auto;
    padding: 80px 96px 140px;
    background: var(--bg);
    min-height: 100vh;
    box-shadow: 0 0 80px rgba(0,0,0,.03);
  }
  .cover {
    height: 140px;
    margin: -80px -96px 40px;
    background: linear-gradient(120deg, #efe4d6 0%, #e7d9c4 40%, #d7c1a4 100%);
    border-radius: 0;
  }
  h1.title {
    font-size: 2.4rem; font-weight: 700; letter-spacing: -0.02em;
    margin: 0 0 8px; color: var(--fg);
  }
  .subtitle { color: var(--fg-soft); font-size: .98rem; margin-bottom: 48px; }
  .toc {
    background: var(--bg-warm);
    border: 1px solid var(--divider);
    border-radius: var(--radius);
    padding: 18px 24px;
    margin: 0 0 48px;
    font-size: .92rem;
  }
  .toc-title {
    font-size: .72rem; text-transform: uppercase;
    letter-spacing: .1em; color: var(--fg-muted);
    font-weight: 600; margin-bottom: 10px;
  }
  .toc ul { list-style: none; margin: 0; padding: 0; }
  .toc ul ul { padding-left: 20px; margin-top: 4px; }
  .toc li { margin-bottom: 4px; }
  .toc a {
    color: var(--fg); text-decoration: none;
    border-bottom: 1px solid transparent;
    transition: border-color .15s;
  }
  .toc a:hover { border-bottom-color: var(--fg-muted); }
  .toc .num { color: var(--fg-muted); margin-right: 8px; font-size: .85em; }
  h1, h2, h3, h4 { font-weight: 700; line-height: 1.3; scroll-margin-top: 24px; color: var(--fg); }
  h1 { font-size: 1.9rem; margin: 48px 0 14px; }
  h2 { font-size: 1.5rem; margin: 44px 0 14px; }
  h3 { font-size: 1.2rem; margin: 32px 0 10px; }
  h4 { font-size: 1.02rem; margin: 24px 0 8px; color: var(--fg-soft); }
  p { margin: 0 0 12px; color: var(--fg); }
  strong { font-weight: 700; background: var(--accent-soft); padding: 0 2px; border-radius: 2px; }
  em { font-style: italic; color: var(--fg-soft); }
  a { color: var(--accent); text-decoration: underline; text-decoration-color: var(--accent-soft); text-underline-offset: 3px; }
  a:hover { text-decoration-color: var(--accent); }
  ul, ol { margin: 8px 0 16px 24px; }
  li { margin-bottom: 4px; color: var(--fg); }
  blockquote {
    border-left: 3px solid var(--fg);
    padding: 2px 0 2px 18px;
    margin: 16px 0;
    font-style: normal;
    color: var(--fg-soft);
  }
  hr { border: none; border-top: 1px solid var(--divider); margin: 40px 0; }
  img { max-width: 100%; height: auto; border-radius: var(--radius); box-shadow: var(--shadow-soft); }
  table {
    width: 100%; border-collapse: collapse;
    font-size: .9rem; margin: 12px 0 24px;
    border: 1px solid var(--divider);
  }
  thead th {
    background: var(--bg-warm); font-weight: 600;
    padding: 10px 14px; text-align: left;
    border-bottom: 1px solid var(--divider);
    color: var(--fg-soft);
    font-size: .82rem; text-transform: uppercase; letter-spacing: .04em;
  }
  tbody td { padding: 10px 14px; border-bottom: 1px solid var(--divider); vertical-align: top; }
  tbody tr:last-child td { border-bottom: none; }
  code {
    font-family: "SF Mono", "Fira Code", ui-monospace, Menlo, Consolas, monospace;
    font-size: .86em;
    background: var(--bg-warm);
    border: 1px solid var(--divider);
    padding: 1px 6px;
    border-radius: var(--radius);
    color: #a14f4a;
  }
  pre {
    background: var(--bg-warm);
    border: 1px solid var(--divider);
    border-radius: var(--radius);
    padding: 16px 20px;
    overflow-x: auto;
    margin: 0 0 20px;
    font-size: .86rem;
    line-height: 1.6;
  }
  pre code {
    background: none; border: none; padding: 0;
    color: var(--fg); font-size: inherit;
  }
  @media (max-width: 780px) {
    .page { padding: 40px 24px 80px; box-shadow: none; }
    .cover { margin: -40px -24px 28px; height: 100px; }
    h1.title { font-size: 1.9rem; }
  }
</style>
</head>
<body>
<div class="page">
  <div class="cover"></div>
  <h1 class="title">{{TITLE}}</h1>
  <div class="subtitle">{{SUBTITLE}}</div>
  {{TOC_BLOCK}}
  <main>
  {{CONTENT}}
  </main>
</div>
</body>
</html>
