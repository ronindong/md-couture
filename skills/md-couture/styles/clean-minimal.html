<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{TITLE}}</title>
<style>
  :root {
    --fg: #1f2328;
    --fg-muted: #656d76;
    --fg-subtle: #8c959f;
    --bg: #ffffff;
    --bg-muted: #f6f8fa;
    --border: #d0d7de;
    --border-muted: #e5e7eb;
    --accent: #0969da;
    --danger: #cf222e;
    --radius: 6px;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { font-size: 16px; scroll-behavior: smooth; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", Helvetica, Arial, sans-serif;
    background: var(--bg); color: var(--fg);
    line-height: 1.7;
  }
  .wrap { max-width: 820px; margin: 0 auto; padding: 64px 32px 120px; }
  header { border-bottom: 1px solid var(--border-muted); padding-bottom: 24px; margin-bottom: 40px; }
  header h1 { font-size: 2rem; font-weight: 700; letter-spacing: -0.01em; margin-bottom: 8px; }
  header .subtitle { color: var(--fg-muted); font-size: 1rem; }
  .toc {
    background: var(--bg-muted);
    border: 1px solid var(--border-muted);
    border-radius: var(--radius);
    padding: 16px 20px 16px 36px;
    margin-bottom: 40px;
    font-size: .92rem;
  }
  .toc-title {
    margin-left: -16px;
    font-weight: 600; color: var(--fg-muted);
    font-size: .78rem; text-transform: uppercase; letter-spacing: .08em;
    margin-bottom: 8px;
  }
  .toc ul { margin: 0; padding-left: 16px; list-style: disc; }
  .toc ul ul { list-style: circle; margin-top: 2px; }
  .toc a { color: var(--accent); text-decoration: none; }
  .toc a:hover { text-decoration: underline; }
  .toc .num { display: none; }
  h1, h2, h3, h4, h5, h6 { font-weight: 600; line-height: 1.3; scroll-margin-top: 24px; }
  h1 { font-size: 1.8rem; margin: 40px 0 16px; padding-bottom: 8px; border-bottom: 1px solid var(--border-muted); }
  h2 { font-size: 1.4rem; margin: 36px 0 14px; padding-bottom: 6px; border-bottom: 1px solid var(--border-muted); }
  h3 { font-size: 1.15rem; margin: 28px 0 10px; }
  h4 { font-size: 1rem; margin: 20px 0 8px; color: var(--fg-muted); }
  p { margin: 0 0 14px; }
  strong { font-weight: 600; }
  em { font-style: italic; }
  a { color: var(--accent); }
  ul, ol { margin: 0 0 16px 24px; }
  li { margin-bottom: 4px; }
  blockquote {
    border-left: 3px solid var(--border);
    color: var(--fg-muted);
    padding: 2px 16px;
    margin: 0 0 16px;
  }
  hr { border: none; border-top: 1px solid var(--border-muted); margin: 32px 0; }
  img { max-width: 100%; height: auto; border-radius: var(--radius); }
  table {
    width: 100%;
    border-collapse: collapse;
    font-size: .92rem;
    margin: 0 0 20px;
    border: 1px solid var(--border-muted);
    border-radius: var(--radius);
    overflow: hidden;
  }
  thead th {
    background: var(--bg-muted);
    font-weight: 600;
    padding: 8px 14px;
    text-align: left;
    border-bottom: 1px solid var(--border-muted);
  }
  tbody td { padding: 8px 14px; border-bottom: 1px solid var(--border-muted); vertical-align: top; }
  tbody tr:last-child td { border-bottom: none; }
  code {
    font-family: "SF Mono", "Fira Code", ui-monospace, Menlo, Consolas, monospace;
    font-size: .88em;
    background: rgba(175,184,193,0.2);
    padding: 2px 6px;
    border-radius: 4px;
  }
  pre {
    background: var(--bg-muted);
    border: 1px solid var(--border-muted);
    border-radius: var(--radius);
    padding: 16px 20px;
    overflow-x: auto;
    margin: 0 0 16px;
    font-size: .88rem;
    line-height: 1.55;
  }
  pre code { background: none; padding: 0; font-size: inherit; }
  @media (max-width: 680px) {
    .wrap { padding: 32px 20px 80px; }
    header h1 { font-size: 1.6rem; }
  }
</style>
</head>
<body>
<div class="wrap">
<header>
  <h1>{{TITLE}}</h1>
  <div class="subtitle">{{SUBTITLE}}</div>
</header>
{{TOC_BLOCK}}
<main>
{{CONTENT}}
</main>
</div>
</body>
</html>
